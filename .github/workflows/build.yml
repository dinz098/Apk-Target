name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Fix Structure
        run: |
          unzip Red-Eye-Mobile-main.zip
          # Pindah kabeh isine folder proyek neng kene
          cp -r Red-Eye-Mobile-main/* . || true
          
          # Nggawe bumbu Gradle Wrapper anyar sing komplit
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
