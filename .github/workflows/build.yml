name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Deep Search
        run: |
          unzip Red-Eye-Mobile-main.zip
          # Nggoleki folder sing bener-bener isine kodingan Android
          PROJECT_ROOT=$(find . -name "gradlew" -printf '%h\n' | head -n 1)
          echo "Project found in: $PROJECT_ROOT"
          # Mindah kabeh isine folder kuwi neng folder utama GitHub
          cp -r $PROJECT_ROOT/* . || true
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
