name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # IKI JALUR SING LUWIH AMAN: Nganggo Gradle versi 7.6 ben ra rewel
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6

      - name: Extract and Prep
        run: |
          unzip Red-Eye-Mobile-main.zip
          cp -r Red-Eye-Mobile-main/* . || true
          chmod +x gradlew

      - name: Build with Gradle
        # Nganggo perintah 'gradle' langsung, ora usah './gradlew' nek wrapper-e rusak
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
