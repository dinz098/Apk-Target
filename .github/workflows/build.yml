name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract and Repair Gradle
        run: |
          unzip Red-Eye-Mobile-main.zip
          ROOT_DIR=$(find . -name "build.gradle" -printf '%h\n' | head -n 1)
          cp -r $ROOT_DIR/* . || true
          
          # IKI JIMATE: Nggawe Gradle Wrapper anyar ben ra error
          gradle wrapper
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
